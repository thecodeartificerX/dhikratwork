name: dhikratwork
description: "DhikrAtWork — Islamic dhikr tracking for desktop. Windows + macOS."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Database — use sqflite_common_ffi for desktop (Windows + macOS)
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0

  # Navigation
  go_router: ^14.6.2

  # Typography
  google_fonts: ^6.2.1

  # Charts (stats screen)
  fl_chart: ^0.69.0

  # Platform integration
  window_manager: ^0.4.3
  desktop_multi_window: ^0.3.0
  hotkey_manager: ^0.2.3
  tray_manager: ^0.2.3

  # File system access (data export)
  path_provider: ^2.1.2

  # Payments / subscription
  url_launcher: ^6.3.1

  # Firebase (subscription verification — read-only Firestore)
  firebase_core: ^3.8.1
  cloud_firestore: ^5.5.1

  # Packaging / auto-update
  auto_updater: ^0.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.8

flutter:
  uses-material-design: true
  assets:
    - assets/tray/tray_icon.png
