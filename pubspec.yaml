name: dhikratwork
description: "DhikrAtWork — Islamic dhikr tracking for desktop. Windows + macOS."
publish_to: 'none'
version: 0.1.0+1
homepage: https://github.com/thecodeartificerX/dhikratwork
repository: https://github.com/thecodeartificerX/dhikratwork
issue_tracker: https://github.com/thecodeartificerX/dhikratwork/issues

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter

  # State management
  provider: ^6.1.2

  # Database — use sqflite_common_ffi for desktop (Windows + macOS)
  sqflite_common_ffi: ^2.3.4
  path: ^1.9.0

  # Typography
  google_fonts: ^6.2.1

  # Charts (stats screen)
  fl_chart: ^0.69.0

  # Platform integration
  window_manager: ^0.4.3
  hotkey_manager: ^0.2.3
  tray_manager: ^0.2.3

  # File system access (data export)
  path_provider: ^2.1.2

  # Payments / subscription
  url_launcher: ^6.3.1

  # Screen info (multi-monitor bounds clamping)
  screen_retriever: ^0.2.0

  # Packaging / auto-update
  auto_updater: ^0.2.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  integration_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  msix: ^3.16.8

msix_config:
  display_name: DhikrAtWork
  publisher_display_name: DhikrAtWork
  identity_name: com.dhikratwork.app
  msix_version: 1.0.0.0
  logo_path: assets/icons/app_icon.png
  start_menu_icon_path: assets/icons/app_icon.png
  tile_icon_path: assets/icons/app_icon.png
  icons_background_color: transparent
  architecture: x64
  capabilities: internetClient
  certificate_path: windows/signing/CERTIFICATE.pfx
  certificate_password: YOUR_CERT_PASSWORD
  install_certificate: false
  app_installer:
    hours_between_update_checks: 12
    automatic_background_task: true
    update_blocks_activation: false
    show_prompt: true
    force_update_from_any_version: false
    uri: https://github.com/thecodeartificerX/dhikratwork/releases/latest/download/DhikrAtWork.appinstaller

flutter:
  uses-material-design: true
  assets:
    - assets/tray/tray_icon.png
